name: voxlibre_lecteur_ebook_ia
description: "A Flutter project for reading EPUBs and reading them aloud with Mistral TTS."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  epub_view: ^3.2.0
  http: ^1.2.0
  audioplayers: ^6.0.0
  path_provider: ^2.1.2
  flutter_dotenv: ^5.1.0
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
